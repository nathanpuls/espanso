# espanso match file

# For a complete introduction, visit the official docs at: https://espanso.org/docs/

# You can use this file to define the base matches (aka snippets)
# that will be available in every application when using espanso.

# Matches are substitution rules: when you type the "trigger" string
# it gets replaced by the "replace" string.

# yaml-language-server: $schema=https://raw.githubusercontent.com/espanso/espanso/dev/schemas/match.schema.json

matches:
  # Simple text replacement
  - trigger: ":espanso"
    replace: "Hi there!"

  - trigger: ".ok"
    replace: "136732"
 
  - trigger: ".ee"
    replace: "espanso edit"

  # NOTE: espanso uses YAML to define matches, so pay attention to the indentation!

  # But matches can also be dynamic:

  # Print the current date
  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%m/%d/%Y"

  # Print the output of a shell command
  - trigger: ":shell"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo 'Hello from your shell'"

  # And much more! For more information, visit the docs: https://espanso.org/docs/

  
  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%m/%d/%Y"

  - trigger: ":dow"
    replace: "{{mydow}}"
    vars:
      - name: mydow
        type: date
        params:
          format: "%A"

  - trigger: ":officekey"
    replace: "136732"

  - trigger: ":officephone"
    replace: "2813744500"

  - trigger: ":phone"
    replace: "323-395-8384"

  - trigger: ":udsbasic"
    replace: "39416"

  - trigger: ":udscomp"
    replace: "39428"

  - trigger: ":timetest"
    replace: "Date: {{mydate}} | Long: {{mydate_long}} | Day: {{mydow}} | Month: {{mymonth}} | Year: {{myyear}} | Time: {{mytime}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%m/%d/%Y"
      - name: mydate_long
        type: date
        params:
          format: "%B %d, %Y"
      - name: mydow
        type: date
        params:
          format: "%A"
      - name: mymonth
        type: date
        params:
          format: "%B"
      - name: myyear
        type: date
        params:
          format: "%Y"
      - name: mytime
        type: date
        params:
          format: "%I:%M %p"

  - trigger: ":portalguide"
    replace: |
      How to Access the Patient Portal

      Direct link (Texas):
      https://pp-wfe-100.advancedmd.com/136732/account/logon

      For other states:
      Visit https://lifestance.com/patient-portal/
      and select your state.

      Step-by-step instructions:

      1. Go to LifeStance.com
      2. Scroll to the bottom of the page
      3. Under Quick Links, click Patient Portal
      4. Select your state
      5. Click Access Patient Portal
      6. Sign in using your email and password
        - If you're new, click Register
        - If needed, click Forgot Password

  - trigger: ":lamictalguide"
    replace: |
      Lamictal Titration Guide (Target Dose: 200 mg/day)
      Weeks 1-2: 25 mg once daily
      Weeks 3-4: 25 mg twice daily (morning + evening) total 50 mg/day
      Weeks 5-6: 50 mg twice daily (morning + evening) total 100 mg/day
      After week 6: Goal dose may be 100 mg twice daily (200 mg/day)

