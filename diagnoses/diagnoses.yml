matches:

  # =========================
  # Neurodevelopmental / Childhood
  # =========================

  - trigger: ".dx-adhd"
    replace: "Attention-Deficit/Hyperactivity Disorder"

  - trigger: ".dx-asd"
    replace: "Autism Spectrum Disorder"

  - trigger: ".dx-intellectual"
    replace: "Intellectual Disability"

  - trigger: ".dx-learning"
    replace: "Specific Learning Disorder"

  - trigger: ".dx-tic"
    replace: "Tic Disorder / Tourette's Disorder"

  - trigger: ".dx-selective"
    replace: "Selective Mutism"

  - trigger: ".dx-separation"
    replace: "Separation Anxiety Disorder"


